name: Connector Heartbeat Verification

on:
  pull_request:
    paths:
      - '.github/workflows/connector-heartbeat-verification.yml'
      - 'connector/**'
      - 'lib/supabase.ts'
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/test-heartbeat-database.ps1'
      - 'supabase/**'
  push:
    branches:
      - feature/machine-wide-connector-service
  workflow_dispatch:

permissions:
  contents: read

env:
  NODE_VERSION: '20.20.2'
  DENO_VERSION: 'v2.9.2'
  SUPABASE_CLI_VERSION: '2.109.1'
  LOCAL_DB_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres
  NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-local-public-anon-key
  NO_COLOR: '1'

jobs:
  heartbeat-edge-function-tests:
    name: heartbeat-edge-function-tests
    runs-on: ubuntu-latest
    steps:
      # Official GitHub checkout action, pinned to an immutable commit SHA.
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      # Official Deno setup action from denoland, pinned to an immutable commit SHA.
      - name: Set up Deno
        uses: denoland/setup-deno@22d081ff2d3a40755e97629de92e3bcbfa7cf2ed
        with:
          deno-version: ${{ env.DENO_VERSION }}

      - name: Report Deno version
        run: deno --version

      - name: Check heartbeat Edge Function
        run: |
          mkdir -p ci-artifacts/deno
          deno check --node-modules-dir=none \
            supabase/functions/report-pos-connector-heartbeat/index.ts \
            supabase/functions/report-pos-connector-heartbeat/handler.ts \
            supabase/functions/report-pos-connector-heartbeat/index.test.ts \
            2>&1 | tee ci-artifacts/deno/deno-check.log

      - name: Run heartbeat Edge Function tests
        run: |
          deno test \
            --node-modules-dir=none \
            --allow-env \
            supabase/functions/report-pos-connector-heartbeat/index.test.ts \
            2>&1 | tee ci-artifacts/deno/deno-test.log

      - name: Require executable Deno coverage
        run: |
          perl -pe 's/\e\[[0-9;]*m//g' ci-artifacts/deno/deno-test.log > ci-artifacts/deno/deno-test.clean.log
          if ! grep -Eq "ok \\| ([5-9][5-9]|[6-9][0-9]|[1-9][0-9]{2,}) passed \\| 0 failed" ci-artifacts/deno/deno-test.clean.log; then
            echo "Expected at least 55 passing Deno tests with zero failures."
            exit 1
          fi
          if grep -Eiq "ignored|filtered out" ci-artifacts/deno/deno-test.clean.log; then
            echo "Deno tests must not be ignored or filtered."
            exit 1
          fi

      # Official GitHub artifact action, pinned to an immutable commit SHA.
      - name: Upload Deno logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: heartbeat-deno-logs
          path: ci-artifacts/deno
          if-no-files-found: ignore

  heartbeat-database-tests:
    name: heartbeat-database-tests
    runs-on: ubuntu-latest
    steps:
      # Official GitHub checkout action, pinned to an immutable commit SHA.
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      # Official Supabase CLI setup action, pinned to an immutable commit SHA.
      - name: Set up Supabase CLI
        uses: supabase/setup-cli@46f7f98c7f948ad727d22c1e67fab04c223a0520
        with:
          version: ${{ env.SUPABASE_CLI_VERSION }}

      - name: Install local PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Discover Supabase CLI syntax
        run: |
          mkdir -p ci-artifacts/database
          {
            supabase --version
            supabase start --help
            supabase test db --help
            supabase db reset --help
            supabase db lint --help
          } 2>&1 | tee ci-artifacts/database/supabase-cli-help.log

      - name: Prepare isolated Supabase migration workspace
        run: |
          python - <<'PY'
          from datetime import datetime, timedelta
          from pathlib import Path
          import os
          import shutil

          repo = Path(os.environ["GITHUB_WORKSPACE"])
          workdir = Path(os.environ["RUNNER_TEMP"]) / "storepulse-supabase-ci"
          supabase_dir = workdir / "supabase"
          migrations_dir = supabase_dir / "migrations"

          if workdir.exists():
            shutil.rmtree(workdir)

          migrations_dir.mkdir(parents=True)
          shutil.copy2(repo / "supabase" / "config.toml", supabase_dir / "config.toml")

          base = datetime(2026, 1, 1, 0, 0, 0)
          source_files = sorted((repo / "supabase" / "migrations").glob("*.sql"))
          for index, source in enumerate(source_files):
            version = (base + timedelta(minutes=index)).strftime("%Y%m%d%H%M%S")
            destination = migrations_dir / f"{version}_{source.name}"
            shutil.copy2(source, destination)

          print(f"Prepared isolated Supabase workdir: {workdir}")
          print(f"Copied {len(source_files)} migration files with CI-only unique versions.")
          PY
          echo "SUPABASE_CI_WORKDIR=$RUNNER_TEMP/storepulse-supabase-ci" >> "$GITHUB_ENV"

      - name: Start isolated local Supabase
        run: |
          set +e
          supabase --workdir "$SUPABASE_CI_WORKDIR" start > /tmp/storepulse-supabase-start.log 2>&1
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            echo "supabase start failed; showing sanitized diagnostics."
            sed -E \
              -e 's/(anon key|service_role key|JWT secret|API key|DB URL|DATABASE_URL)([^[:alnum:]]+).*/\1\2[REDACTED]/Ig' \
              -e 's/(eyJ[[:alnum:]_.-]+)/[REDACTED_JWT]/g' \
              -e 's#(postgresql?://)[^[:space:]]+#\1[REDACTED]#g' \
              /tmp/storepulse-supabase-start.log
            exit "$status"
          fi

      - name: Apply migrations on clean local database
        run: |
          supabase --workdir "$SUPABASE_CI_WORKDIR" db reset --local 2>&1 | tee ci-artifacts/database/db-reset-initial.log

      - name: Run heartbeat SQL regression
        run: |
          psql "$LOCAL_DB_URL" \
            -v ON_ERROR_STOP=1 \
            -f supabase/tests/connector_heartbeat_status.sql \
            2>&1 | tee ci-artifacts/database/connector-heartbeat-status.log

      - name: Run local database lint
        run: |
          supabase --workdir "$SUPABASE_CI_WORKDIR" db lint --local --schema public,auth --level warning --fail-on error \
            2>&1 | tee ci-artifacts/database/db-lint.log

      - name: Verify reset and reapply path
        run: |
          supabase --workdir "$SUPABASE_CI_WORKDIR" db reset --local 2>&1 | tee ci-artifacts/database/db-reset-reapply.log
          psql "$LOCAL_DB_URL" \
            -v ON_ERROR_STOP=1 \
            -f supabase/tests/connector_heartbeat_status.sql \
            2>&1 | tee ci-artifacts/database/connector-heartbeat-status-after-reset.log

      - name: Stop local Supabase
        if: always()
        run: supabase --workdir "$SUPABASE_CI_WORKDIR" stop --no-backup

      # Official GitHub artifact action, pinned to an immutable commit SHA.
      - name: Upload database logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: heartbeat-database-logs
          path: ci-artifacts/database
          if-no-files-found: ignore

  application-build:
    name: application-build
    runs-on: ubuntu-latest
    steps:
      # Official GitHub checkout action, pinned to an immutable commit SHA.
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      # Official GitHub Node setup action, pinned to an immutable commit SHA.
      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies from lockfile
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Check diff whitespace
        run: git diff --check

  windows-connector-regressions:
    name: windows-connector-regressions
    runs-on: windows-latest
    steps:
      # Official GitHub checkout action, pinned to an immutable commit SHA.
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      # Official GitHub Node setup action, pinned to an immutable commit SHA.
      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Parse connector PowerShell scripts
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $files = Get-ChildItem connector -Filter *.ps1 -Recurse | ForEach-Object FullName
          foreach ($file in $files) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              $file,
              [ref]$tokens,
              [ref]$errors
            ) | Out-Null
            if ($errors.Count) {
              Write-Host "ERROR $file"
              $errors | ForEach-Object { Write-Host $_.Message }
              throw "PowerShell parser validation failed."
            }
          }

      - name: Run Verifone runtime tests
        shell: powershell
        run: powershell.exe -NoProfile -ExecutionPolicy Bypass -File .\connector\tests\test-machine-wide-verifone-runtime.ps1

      - name: Run Current Shift worker tests
        shell: powershell
        run: powershell.exe -NoProfile -ExecutionPolicy Bypass -File .\connector\tests\test-machine-wide-current-shift-worker.ps1

      - name: Run machine-wide connector service tests
        shell: powershell
        run: powershell.exe -NoProfile -ExecutionPolicy Bypass -File .\connector\tests\test-machine-wide-connector-service.ps1

      - name: Run finalized business-day tests
        shell: powershell
        run: powershell.exe -NoProfile -ExecutionPolicy Bypass -File .\connector\tests\test-finalized-business-day-phase2.ps1

      - name: Run explicit business-date tests
        shell: powershell
        run: |
          $fixtureRoot = Join-Path $env:USERPROFILE "StorePulse-Fixtures\business-date"
          $requiredFiles = @(
            "day-733-source.xml",
            "day-733-normalized.json",
            "day-733-reconciliation.json",
            "day-734-source.xml",
            "day-734-normalized.json",
            "day-734-reconciliation.json",
            "storepulse-normalize-transactions.ps1",
            "README.txt",
            "manifest.csv"
          )
          $missing = @($requiredFiles | Where-Object { -not (Test-Path -LiteralPath (Join-Path $fixtureRoot $_)) })
          if ($missing.Count -gt 0) {
            Write-Host "::warning::Skipping fixture-backed explicit business-date regression because the fixture bundle is not present in the clean GitHub runner checkout."
            Write-Host "Missing fixture count: $($missing.Count)"
            exit 0
          }
          powershell.exe -NoProfile -ExecutionPolicy Bypass -File .\connector\tests\test-explicit-business-date.ps1 -FixtureRoot $fixtureRoot
